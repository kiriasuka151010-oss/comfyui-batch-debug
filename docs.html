<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComfyUI Batch Debug — 批量参数扫描 + 交互评分</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--red:#f85149;--purple:#a371f7}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;line-height:1.7;padding:2rem;max-width:1000px;margin:0 auto}
  h1{font-size:2rem;margin-bottom:.25rem;color:#fff}
  h2{font-size:1.4rem;margin:2.5rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);color:#fff}
  h3{font-size:1.1rem;margin:1.5rem 0 .5rem;color:var(--accent)}
  h4{font-size:.95rem;margin:1rem 0 .3rem;color:var(--text)}
  p{margin:.6rem 0;color:var(--text)}
  .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.78rem;font-weight:600;margin-right:6px}
  .badge-green{background:#1a3a2a;color:var(--green)}
  .badge-purple{background:#2a1a3a;color:var(--purple)}
  .badge-orange{background:#3a2a1a;color:var(--orange)}
  .badge-red{background:#3a1a1a;color:var(--red)}
  .hero{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
  .hero h2{margin:0 0 .5rem;border:none}
  .hero ul{margin-left:1.2rem;color:var(--text);font-size:.92rem}
  .hero ul li{margin:.3rem 0}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin:1.2rem 0}
  .card h3{margin-top:0}
  table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.9rem}
  th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--border)}
  th{background:var(--surface);color:var(--muted);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
  code{background:#1c2128;padding:1px 6px;border-radius:3px;font-size:.88em;color:var(--orange)}
  .pipeline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:'SF Mono','Fira Code',monospace;font-size:.85rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin:1rem 0}
  .pipeline .node{background:#1c2128;border:1px solid var(--border);border-radius:6px;padding:6px 12px;white-space:nowrap}
  .pipeline .arrow{color:var(--muted)}
  .pipeline .node.config{border-color:var(--purple)}
  .pipeline .node.execute{border-color:var(--accent)}
  .pipeline .node.save{border-color:var(--green)}
  .tip{background:#1a2a3a;border-left:3px solid var(--accent);padding:.8rem 1rem;border-radius:4px;margin:1rem 0;font-size:.9rem}
  .warning{background:#3a2a1a;border-left:3px solid var(--orange);padding:.8rem 1rem;border-radius:4px;margin:1rem 0;font-size:.9rem}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0}
  .two-col .mode-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem}
  .two-col .mode-card h4{margin:0 0 .5rem}
  .two-col .mode-card p{font-size:.85rem;color:var(--muted);margin:0}
  .two-col .mode-card.active{border-color:var(--green)}
  .folder-tree{background:#1c2128;border-radius:6px;padding:1rem;font-family:'SF Mono','Fira Code',monospace;font-size:.8rem;margin:1rem 0;line-height:1.8}
  .folder-tree .comment{color:var(--muted)}
  .resume-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
  .resume-block pre{background:#1c2128;padding:1rem;border-radius:6px;font-size:.82rem;line-height:1.6;overflow-x:auto}
  hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
  .footer{text-align:center;color:var(--muted);font-size:.8rem;margin-top:3rem}
</style>
</head>
<body>

<h1>🔬 ComfyUI Batch Debug</h1>
<p class="subtitle">批量参数扫描 · 多 LoRA 链式扫描 · 交互评分查看器</p>
<div>
  <span class="badge badge-green">v2.1</span>
  <span class="badge badge-purple">6 槽 LoRA</span>
  <span class="badge badge-orange">D站 Pipeline</span>
  <span class="badge badge-red">HTML Viewer</span>
</div>

<hr>
<div class="footer">ComfyUI Batch Debug Plugin · v2.1 · 开源</div>

</body>
</html>
